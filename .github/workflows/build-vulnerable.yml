name: build
on:
  push:
    branches:
      - main
    paths_ignore:
      - '.gitignore'
      - '__pycache__'
      - '**.md'

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    name: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Docker Login
        run: docker login --username ${{github.repository_owner}} --password ${{secrets.GITHUB_TOKEN}} ghcr.io
      - name: Build Docker images
        run: docker build -t ghcr.io/${{ github.repository_owner }}/vulnerable-image:${{github.run_number}} -f Dockerfile.vulnerable .
      - name: Aqua Security Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/vulnerable-image:${{github.run_number}}
          exit-code: 1
          format: 'sarif'
          output: 'trivy-vulnerable.sarif'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-vulnerable.sarif'
    
